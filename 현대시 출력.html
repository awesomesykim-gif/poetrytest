    <script>

    <style>
        /* 웹폰트 본문 가독성 강화 */

        body {
            font-family: 'Pretendard', sans-serif;

            color: #1e293b;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;

        /* 시 본문 가독성 세팅 (줄간격 및 자간) */
        .poem-content {
            font-family: 'Pretendard', 'Noto Sans KR', 'Georgia', serif;
            line-height: 2.1;

        /* 인쇄 최적화 설정 */
        @media print {
            body {
                background-color: #ffffff !important;
                color: #000000 !important;

            .no-print {

                page-break-inside: avoid;
            }
            /* 페이지 여백 */
            @page {

</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- App Wrapper -->
    <div id="app" class="w-full max-w-7xl mx-auto px-4 py-8 md:py-12 flex-grow">
        
        <!-- [1] 메인 화면 영역 -->
        <div id="main-view" class="space-y-8">
            <!-- 상단 헤더 -->
            <header class="text-center space-y-3">
                <span class="inline-block bg-slate-100 text-slate-700 text-xs font-semibold px-3 py-1 rounded-full tracking-wider">2026학년도 2학년 문학 수행평가</span>
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">현대시 수행평가 비교·분석</h1>
                <p class="text-slate-500 text-sm md:text-base max-w-lg mx-auto leading-relaxed">
                    현대시 20편 중 비교·분석할 작품 <strong class="text-indigo-600 font-bold">2편</strong>을 선택하세요.
                </p>
            </header>

            <!-- 검색 및 안내 메시지 컨트롤러 -->
            <div class="bg-white rounded-xl border border-slate-200 p-4 md:p-6 shadow-sm space-y-4">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <!-- 검색 입력창 -->
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <!-- 검색 돋보기 아이콘 -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </span>
                        <input type="text" id="search-input" oninput="handleSearch()" placeholder="작품명 또는 시인 이름을 입력하여 검색하세요..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    </div>
                    
                    <!-- 단축키 안내 -->
                    <div class="text-xs text-slate-400 flex items-center gap-2 self-end md:self-auto">
                        <span class="bg-slate-100 px-2 py-1 rounded border border-slate-200 font-mono shadow-sm">ESC</span>
                        <span>누르면 전체 선택이 초기화됩니다.</span>
                    </div>
                </div>

                <!-- 실시간 선택 상태 바 -->
                <div class="flex flex-wrap items-center justify-between pt-3 border-t border-slate-100 gap-2">
                    <div class="text-sm text-slate-600">
                        현재 선택된 작품: 
                        <span id="selected-status" class="font-bold text-indigo-600">선택된 작품 없음</span>
                    </div>
                    <button onclick="resetSelection()" class="text-xs font-semibold text-rose-500 hover:text-rose-700 transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        선택 초기화
                    </button>
                </div>
            </div>

            <!-- 시 카드 리스트 컨테이너 -->
            <div id="poem-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- JavaScript를 통해 동적으로 카드 20개가 생성됩니다. -->
            </div>
        </div>

        <!-- [2] 시 출력 및 비교 화면 영역 (기본적으로 숨김) -->
        <div id="compare-view" class="hidden space-y-6">
            <!-- 비교화면 상단 컨트롤 바 (no-print) -->
            <div class="no-print bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm">
                <!-- 뒤로가기 버튼 -->
                <button onclick="showMainView()" class="flex items-center gap-2 px-4 py-2 text-slate-700 hover:text-slate-900 font-medium text-sm transition-all rounded-lg hover:bg-slate-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span>목록으로 돌아가기</span>
                </button>

                <!-- 중앙 선택 정보 -->
                <div id="comparison-badge" class="text-sm font-semibold text-slate-600 bg-slate-50 px-4 py-2 rounded-full border border-slate-200">
                    비교 작품: 번, 번
                </div>

                <!-- 인쇄하기 버튼 -->
                <button onclick="window.print()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm px-5 py-2.5 rounded-lg shadow-sm transition-all duration-150 transform active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    <span>인쇄 및 PDF 저장</span>
                </button>
            </div>

            <!-- 시인 및 제목 상단 헤더 -->
            <div class="text-center py-4 bg-slate-100 border border-slate-200 rounded-xl block print:hidden">
                <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">COMPARE VIEW</span>
                <h2 id="compare-title-header" class="text-xl md:text-2xl font-bold text-slate-800 mt-1"></h2>
            </div>

            <!-- 좌우 비교 시 본문 출력부 (print-layout) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 print-layout">
                <!-- 왼쪽 작품 -->
                <div id="left-poem-container" class="bg-white border border-slate-200 rounded-xl p-8 md:p-10 shadow-sm print-card flex flex-col">
                    <!-- 동적 렌더링 영역 -->
                </div>
                <!-- 오른쪽 작품 -->
                <div id="right-poem-container" class="bg-white border border-slate-200 rounded-xl p-8 md:p-10 shadow-sm print-card flex flex-col">
                    <!-- 동적 렌더링 영역 -->
                </div>
            </div>
        </div>

    </div>

    <!-- 경고 메시지 토스트 안내창 -->
    <div id="toast" class="no-print fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-50">
        <span class="text-rose-400 font-bold">⚠️</span>
        <span id="toast-message" class="text-sm font-medium"></span>
    </div>

    <!-- 하단 고정 액션 바 (메인 화면에서만 표시, no-print) -->
    <footer id="bottom-action-bar" class="no-print sticky bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-4 px-6 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-40">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="text-sm text-slate-500 text-center sm:text-left">
                작품을 반드시 <strong class="text-slate-800 font-semibold">2편</strong> 선택해야 비교 화면으로 이동할 수 있습니다.
            </div>
            <button id="submit-btn" onclick="goToComparison()" class="w-full sm:w-auto px-8 py-3 bg-slate-300 text-slate-500 cursor-not-allowed font-semibold rounded-lg transition-all duration-150 transform">
                선택한 작품 보기 (0/2)
            </button>
        </div>
    </footer>

    <!-- 시 20편 원천 데이터 객체 정의 -->
    <script>
        const poems = [
            {
                number: 1,
                title: "가지가 담을 넘을 때",
                poet: "정끝별",
                content: `이를테면 수양의 늘어진 가지가 담을 넘을 때
그건 수양 가지만의 일은 아니었을 것이다
얼굴 한번 못 마주친 애먼 뿌리와
잠시 살 붙였다 적막히 손을 터는 꽃과 잎이
혼연일체 믿어주지 않았다면
가지 혼자서는 한없이 떨기만 했을 것이다

한 닷새 내리고 내리던 고집 센 비가 아니었으면
밤새 정분만 쌓던 도리 없는 폭설이 아니었으면
담을 넘는다는 게
가지에게는 그리 신명 나는 일이 아니었을 것이다

무엇보다 가지의 마음을 머뭇 세우고
담 밖을 가둬두는 저 금단의 담이 아니었으면
담의 몸을 가로지르고 담의 정수리를 타 넘어
담을 열 수 있다는 걸
수양의 늘어진 가지는 꿈도 꾸지 못했을 것이다

그러니까 목련 가지라든가 감나무 가지라든가
줄장미 줄기라든가 담쟁이 줄기라든가
가지가 담을 넘을 때 가지에게 담은
무명에 획을 긋는
도박이자 도반이었을 것이다.`
            },
            {
                number: 2,
                title: "최고봉",
                poet: "천양희",
                content: `최고봉 천양희

높은 산에 오를 준비를 할 때마다 장비를 챙기면서
운다고 고백한 산사람이 있었다 14번이나 최고봉에 오른 그가
무서워서 운다고? 그 말을 듣는 순간 산 때문이 아니라
두려움 때문일 거라고 생각했다 무서운 비밀을 안 것처럼
나도 무서웠다 산 오를 생각만 하면 너무 무서워서 싼 짐을
풀지만 금방 울면서 다시 짐을 싼다고 한다 언젠가 우리도
울면서 짐을 싼 적이 있다 그에게 산이란 가야 할 곳이므로
울면서도 떠나는 것이다 누구에게나 무서워 울면서도
가야 할 길이 있는 것이다

능선에 서서
산봉우리 오래 올려다보았다
그곳이 너무 멀었다`
            },
            {
                number: 3,
                title: "나팔꽃",
                poet: "송수권",
                content: `바지랑대 끝 더는 꼬일 것이 없어서 끝이다 끝 하고
다음 날 아침에 나가 보면 나팔꽃 줄기는 허공에 두 뺨은 더 자라서
꼬여 있는 것이다. 움직이는 것은 아침 구름 두어 점, 이슬 몇 방울
더 움직이는 바지랑대는 없을 것이었다.

그런데도 다음 날 아침에 나가 보면 덩굴손까지 흘러나와
허공을 감아쥐고 바지랑대를 찾고 있는 것이다

이젠 포기하고 되돌아올 때도 되었거니 하고
다음 날 아침에 나가 보면 가냘픈 줄기에 두세 개의 종까지 매어 달고는
나팔꽃의 꽃봉오리 두세 개
아침 하늘에다 은은한 종소리를 퍼내고 있는 것이다

이젠 더 꼬일 것이 없다 없다고 생각되었을 때
우리의 아픔도 더 한 번 길게 꼬여서 푸른 종소리는 나는 법일까.`
            },
            {
                number: 4,
                title: "저수지",
                poet: "권정우",
                content: `자기 안에 발 담그는 것들을
물에 젖게 하는 법이 없다

모난 돌멩이라고
모난 파문으로 대답하지 않는다

검은 돌맹이라고
검은 파문으로 대답하지 않는다

산이고 구름이고
물가에 늘어선 나무며 나는 새까지
겹쳐서 들어가도
어느 것 하나 상처입지 않는다

바람은
새 없이 넘어가는
수면 위의 줄글을 다 읽기는 하는 건지

하늘이 들어와도 넘치지 않는다.

바닥이 깊고도
높다`
            },
            {
                number: 5,
                title: "산",
                poet: "김광섭",
                content: `이상하게도 내가 사는 데서는
새벽녘이면 산들이
학처럼 날개를 쭉 펴고 날아와서는
종일토록 먹도 않고 말도 않고 엎댔다가는
해 질 무렵이면 기러기처럼 날아서
틀만 남겨 놓고 먼 산속으로 간다

산은 날아도 새둥이나 꽃잎 하나 다치지 않고
짐승들의 굴속에서도
흙한춤돌한 개 들썽거리지 않는다

새나 벌레나 짐승들이 놀랄까 봐
지구처럼 부동의 자세로 떠 간다

그럴 때면 새나 짐승들은
기분 좋게 엎대서
사람처럼 날아가는 꿈을 꾼다

산이 날 것을 미리 알고 사람들이 달아나면
언제나 사람보다 앞서 가다가도
고달프면 쉬란 듯이 정답게 서서
사람이 오기를 기다려 같이 간다

산은 양지바른 쪽에 사람을 묻고
높은 꼭대기에 신을 뫼신다

산은 사람들과 친하고 싶어서
기슭을 끌고 마을에 들어오다가도
사람 사는 꼴이 어수선하면
달팽이처럼 대가리를 들고 슬슬 기어서
도로 험한 봉우리로 올라간다

산은 나무를 기르는 법으로
벼랑에 오르지 못하는 법으로
사람을 다스린다

산은 울적하면 솟아서 봉우리가 되고
물소리를 듣고 싶으면 내려와 깊은 계곡이 된다

산은 한 번 신경질을 되게 내야만
고산(高山)도 되고 명산(名山)도 된다

산은 언제나 기슭에 봄이 먼저 오지만
조금만 올라가면 여름이 머물고 있어서
한 기슭인데 두 계절을
사이좋게 지니고 산다`
            },
            {
                number: 6,
                title: "땅끝",
                poet: "나희덕",
                content: `산 너머 고운 노을을 보려고
그네를 힘차게 차고 올라 발을 굴렸지
노을은 끝내 어둠에게 잡아먹혔지
나를 태우고 날아가던 그넷줄이
오랫동안 삐걱삐걱 떨고 있었어

어릴 때는 나비를 쫓듯
아름다움에 취해 땅끝을 찾아갔지
그건 아마도 끝이 아니었을지도 몰라

그러나 살면서 몇 번은 땅끝에 서게도 되지
파도가 끊임없이 땅을 먹어 들어오는 막바지에서
이렇게 뒷걸음질 치면서 말야

살기 위해서는 이제
뒷걸음질만이 허락된 것이라고
파도가 아가리를 쳐들고 달려드는 곳
찾아 나선 것도 아니었지만
끝내 발 디디며 서 있는 땅의 끝.

그런데 이상하기도 하지
위태로움 속에 아름다움이 스며 있다는 것이
땅끝은 늘 젖어 있다는 것이
그걸 보려고
또 몇 번은 여기에 이르리라는 것이`
            },
            {
                number: 7,
                title: "지구의 근황",
                poet: "함민복",
                content: `나무를 기억한다. 사람들 가슴에
늘 푸른 붓이 되던 나무를 사랑한다
어디서 보나 등은 없고
가슴만 가진 나무를 추억한다.

바람 불 때마다
여린 식물의 뿌리를 잡아주던
나무를 애도한다. 꿈의 하늘을 향해

            const filteredPoems = poems.filter(poem => {
                const normTitle = poem.title.toLowerCase();
                const normPoet = poem.poet.toLowerCase();
                const normSearch = searchQuery.toLowerCase();
                return normTitle.includes(normSearch) || normPoet.includes(normSearch);
            });

            if (filteredPoems.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-400">
                        검색 결과와 일치하는 현대시가 없습니다.
                    </div>
                `;
                return;
            }

            filteredPoems.forEach(poem => {
                const isSelected = selectedNumbers.includes(poem.number);
                
                // 카드 요소 생성
                const card = document.createElement('div');
                card.id = `poem-card-${poem.number}`;
                card.onclick = () => handlePoemSelect(poem.number);
                card.className = `group relative cursor-pointer bg-white rounded-xl border p-5 shadow-sm transition-all duration-200 select-none
                    ${isSelected 
                        ? 'border-indigo-600 ring-2 ring-indigo-600/20 bg-indigo-50/20' 
                        : 'border-slate-200 hover:border-slate-300 hover:shadow-md'}`;

                card.innerHTML = `
                    <div class="flex items-start justify-between">
                        <span class="text-xs font-bold font-mono px-2 py-0.5 rounded-md ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500 group-hover:bg-slate-200'} transition-all">
                            ${poem.number.toString().padStart(2, '0')}
                        </span>
                        <!-- 선택 상태 체크 박스 아이콘 -->
                        <div class="w-5 h-5 rounded-full border flex items-center justify-center transition-all ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300 group-hover:border-slate-400'}">
                            ${isSelected ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                    </div>
                    <div class="mt-4 space-y-1.5">
                        <h3 class="font-bold text-slate-800 text-base group-hover:text-indigo-600 transition-colors truncate">
                            ${poem.title}
                        </h3>
                        <p class="text-xs text-slate-400 font-medium">${poem.poet}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 검색어 가공 및 필터 업데이트
        function handleSearch() {
            const input = document.getElementById('search-input');
            searchQuery = input.value;
            renderPoemGrid();
        }

        // 카드 클릭 시 작동 로직
        function handlePoemSelect(num) {
            const idx = selectedNumbers.indexOf(num);
            if (idx > -1) {
                // 이미 선택된 것은 해제
                selectedNumbers.splice(idx, 1);
            } else {
                // 신규 선택 시 최대 2편 한계 적용
                if (selectedNumbers.length >= 2) {
                    showToast("이미 2편의 작품이 선택되어 있습니다. 변경하려면 먼저 선택을 해제하세요.");
                    return;
                }
                selectedNumbers.push(num);
            }
            renderPoemGrid();
            updateSelectionUI();
        }

        // 선택 상태 바 및 하단 고정 액션바 갱신
        function updateSelectionUI() {
            const statusEl = document.getElementById('selected-status');
            const submitBtn = document.getElementById('submit-btn');

            if (selectedNumbers.length === 0) {
                statusEl.innerText = "선택된 작품 없음";
                statusEl.className = "font-bold text-slate-400";
                
                submitBtn.className = "w-full sm:w-auto px-8 py-3 bg-slate-200 text-slate-400 cursor-not-allowed font-semibold rounded-lg text-sm";
                submitBtn.innerText = "선택한 작품 보기 (0/2)";
            } else {
                // 선택 번호 오름차순 정렬
                selectedNumbers.sort((a, b) => a - b);
                const displayNames = selectedNumbers.map(n => {
                    const poem = poems.find(p => p.number === n);
                    return `${n}번 「${poem.title}」`;
                }).join(', ');

                statusEl.innerText = displayNames;
                statusEl.className = "font-bold text-indigo-600";

                if (selectedNumbers.length === 2) {
                    submitBtn.className = "w-full sm:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg cursor-pointer text-sm shadow-md shadow-indigo-200 transition-all duration-150 transform active:scale-95";
                    submitBtn.innerText = "선택한 작품 보기 (2/2)";
                } else {
                    submitBtn.className = "w-full sm:w-auto px-8 py-3 bg-slate-300 text-slate-600 cursor-not-allowed font-semibold rounded-lg text-sm";
                    submitBtn.innerText = `선택한 작품 보기 (${selectedNumbers.length}/2)`;
                }
            }
        }

        // 선택 리셋
        function resetSelection() {
            selectedNumbers = [];
            renderPoemGrid();
            updateSelectionUI();
            showToast("선택이 초기화되었습니다.");
        }

        // 비교 페이지로 전환
        function goToComparison() {
            if (selectedNumbers.length !== 2) {
                showToast("현대시 2편을 선택하세요.");
                return;
            }

            // 비교 데이터 바인딩
            const leftPoem = poems.find(p => p.number === selectedNumbers[0]);
            const rightPoem = poems.find(p => p.number === selectedNumbers[1]);

            // 상단 비교 정보 갱신
            document.getElementById('comparison-badge').innerHTML = `
                비교 작품: <strong class="text-indigo-600">${leftPoem.number}번 「${leftPoem.title}」</strong> & 
                <strong class="text-indigo-600">${rightPoem.number}번 「${rightPoem.title}」</strong>
            `;
            document.getElementById('compare-title-header').innerText = `「${leftPoem.title}」  vs  「${rightPoem.title}」`;

            // 본문 렌더링 함수
            const renderContent = (poem) => `
                <div class="border-b border-slate-100 pb-5 mb-6">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-0.5 rounded-md font-mono">${poem.number}번</span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight leading-snug">${poem.title}</h2>
                    <p class="text-sm text-slate-400 mt-1 font-medium">${poem.poet}</p>
                </div>
                <!-- 시 본문 영역 -->
                <div class="poem-content flex-grow text-slate-700 text-base md:text-lg whitespace-pre-line tracking-wide">
                    ${poem.content}
                </div>
            `;

            document.getElementById('left-poem-container').innerHTML = renderContent(leftPoem);
            document.getElementById('right-poem-container').innerHTML = renderContent(rightPoem);

            // 화면 전환
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('bottom-action-bar').classList.add('hidden');
            document.getElementById('compare-view').classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // 메인 화면으로 돌아가기
        function showMainView() {
            document.getElementById('compare-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('bottom-action-bar').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // 토스트 팝업 제어
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            const messageEl = document.getElementById('toast-message');
            
            messageEl.innerText = msg;
            
            clearTimeout(toastTimeout);
            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
